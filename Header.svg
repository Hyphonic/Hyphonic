<svg xmlns="http://www.w3.org/2000/svg" width="600" height="450" fill="none" viewBox="0 0 600 450"><foreignObject width="100%" height="100%"><div xmlns="http://www.w3.org/1999/xhtml"><style>@keyframes type{0%{opacity:0;width:0}.1%{opacity:1}}@keyframes hand{25%,35%,45%,80%,90%{transform:rotate(0deg)}30%,40%,85%,95%{transform:rotate(15deg)}}@keyframes gradient-move{0%{background-position:0 50%}50%{background-position:100% 50%}}.card p{font-size:1.7rem;font-family:&quot;Shippori Antique B1&quot;,sans-serif;margin:0;padding:11px;position:relative;top:2px;color:#fff}.card,.card-info{overflow:visible;border-radius:.7rem}.card,.card::after{position:absolute;background:var(--background)}.card{--background:linear-gradient(to right, #13b37f 0%, #11a3c8 100%);width:calc(100% - 50px);height:calc(100% - 50px);padding:.9px;z-index:1;top:50%;left:50%;transform:translate(-50%,-50%)}.card::after{content:&quot;&quot;;top:0;left:0;right:0;z-index:-1;height:100%;width:100%;scale:.1;filter:blur(5px);animation:blurAnimation 2s ease-in-out infinite alternate;animation-delay:1s;transition:opacity .5s}.card-info{--color:#1f1a1d;background:var(--color);color:var(--color);display:flex;flex-direction:column;justify-content:left;align-items:flex-start;width:100%;height:100%}.card .line,.card .title{padding-left:1rem;line-height:2rem;animation:type 2s steps(40,end) forwards;opacity:0;overflow:hidden;text-wrap:pretty;white-space:nowrap}.card .title{line-height:1rem}.card .line:nth-child(1){animation-delay:1s}.card .line:nth-child(2){animation-delay:2.5s}.card .line:nth-child(3){animation-delay:4s}.card .line:nth-child(4){animation-delay:5s}.card .line:nth-child(5){animation-delay:6s}.card .line:nth-child(6){animation-delay:7.5s}.card .line:nth-child(7){animation-delay:8.5s}.card .hand{display:inline-block;animation:hand 3s infinite;transform-origin:70% 75%}.card .gradient{display:inline-block;background:-webkit-linear-gradient(-45deg,#84ffc9,#aab2ff,#eca0ff);background-size:200% 200%;animation:gradient-move 3s infinite;-webkit-background-clip:text;-webkit-text-fill-color:transparent}</style><div class="card"><div class="card-info"><p class="line title"><p class="hand">👋</p>Hello, I&apos;m<p class="gradient">Hyphonical</p></p><p class="line">• 💻 3D Model Designer</p><p class="line">• 📃 Proficient Python and</p><p class="line">Skript Developer</p><p class="line">• 📚 Student at Thomas More</p><p class="line">• 🧩 Self-Taught Pixel Art</p><p class="line">Designer</p></div></div></div></foreignObject></svg>